name: CodeQL

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    # The repository has GitHub CodeQL default setup enabled; keep this
    # advanced workflow manual-only so it documents SAST coverage without
    # colliding with default setup uploads on pull_request/push.
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
          - language: python
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a
