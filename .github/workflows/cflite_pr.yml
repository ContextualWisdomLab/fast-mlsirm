name: ClusterFuzzLite PR fuzzing

on:
  pull_request:
    paths:
      - ".clusterfuzzlite/**"
      - ".github/workflows/cflite_pr.yml"
      - "Cargo.toml"
      - "crates/**"
      - "fuzz/**"

permissions:
  contents: read

jobs:
  PR:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.sanitizer }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address]
    steps:
      - name: Prepare ClusterFuzzLite output directory
        run: |
          mkdir -p "$GITHUB_WORKSPACE/build-out"
          chmod -R a+rwx "$GITHUB_WORKSPACE/build-out"
          echo "Prepared ClusterFuzzLite build-out for non-root fuzzbuilder writes"
          ls -ld "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/build-out"
      - name: Build fuzzers (${{ matrix.sanitizer }})
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@82652fb49e77bc29c35da1167bb286e93c6bcc05
        with:
          language: rust
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: ${{ matrix.sanitizer }}
      - name: Run fuzzers (${{ matrix.sanitizer }})
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@82652fb49e77bc29c35da1167bb286e93c6bcc05
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 120
          mode: code-change
          output-sarif: true
          sanitizer: ${{ matrix.sanitizer }}
