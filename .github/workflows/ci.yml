name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - run: uv sync --locked --extra dev
      - run: uv run pytest

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - run: cargo test --workspace
      - run: cargo test --manifest-path crates/fast-mlsirm-py/Cargo.toml

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
      - run: uv sync --locked --extra dev
      - run: uv run python -m build --no-isolation
      - run: uv run python -m twine check dist/*
      - name: Verify built wheel imports Rust extension
        run: |
          uv run python - <<'PY'
          import subprocess
          from pathlib import Path

          wheel = next(Path("dist").glob("fast_mlsirm-*.whl"))
          subprocess.run(
              [
                  "uv",
                  "run",
                  "--isolated",
                  "--with",
                  str(wheel),
                  "python",
                  "-c",
                  "import fast_mlsirm, fast_mlsirm._core as core; print(fast_mlsirm.__version__, hasattr(core, 'neg_loglik_and_grad'))",
              ],
              check=True,
          )
          PY
      - name: Run release acceptance smoke
        run: |
          uv run python scripts/release_acceptance.py --out release-acceptance --require-rust --persons 12 --dims 1 --items-per-dim 2 --latent-dim 1 --latent-dims 1,2 --folds 2 --max-iter 1 --n-restarts 1
          uv run python - <<'PY'
          import json

          with open("release-acceptance/acceptance_summary.json", encoding="utf-8") as fh:
              summary = json.load(fh)
          assert summary["status"] == "ok"
          PY
      - name: Run enterprise sales readiness gate
        run: |
          uv run python scripts/sales_readiness.py \
            --acceptance release-acceptance/acceptance_summary.json \
            --dist dist \
            --require-rust \
            --require-20b-product \
            --check-import \
            --out release-acceptance/sales_readiness_manifest.json
          uv run python - <<'PY'
          import json

          with open("release-acceptance/sales_readiness_manifest.json", encoding="utf-8") as fh:
              manifest = json.load(fh)
          assert manifest["status"] == "ok"
          PY
