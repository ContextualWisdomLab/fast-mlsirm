name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .[dev]
      - run: pytest

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace
      - run: cargo test --manifest-path crates/fast-mlsirm-py/Cargo.toml

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python -m pip install --force-reinstall dist/*.whl
      - run: python -c "import fast_mlsirm, fast_mlsirm._core as core; print(fast_mlsirm.__version__, hasattr(core, 'neg_loglik_and_grad'))"
      - name: Smoke test Rust backend CLI
        run: |
          tmpdir="$(mktemp -d)"
          python -m fast_mlsirm.cli simulate --persons 12 --dims 1 --items-per-dim 2 --latent-dim 1 --out "$tmpdir/sim" --json
          python -m fast_mlsirm.cli fit --responses "$tmpdir/sim/responses.npy" --factors "$tmpdir/sim/item_factor.csv" --model MLS2PLM --max-iter 1 --n-restarts 1 --backend rust --out "$tmpdir/fit" --json
          python - <<'PY' "$tmpdir/fit/fit_summary.json"
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as fh:
              summary = json.load(fh)
          assert summary["backend"] == "rust"
          PY
